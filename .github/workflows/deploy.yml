name: CI - Build Verification

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # 前端：构建验证（Netlify 自动部署）
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      # Netlify 自动从 GitHub 部署（已连接 Netlify GitHub 集成）
      # 此 workflow 只负责构建验证，实际部署由 Netlify 自动完成

  # 后端：构建 Docker 镜像并推送
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

